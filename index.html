<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFF3E0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <title>Pizza Div</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.0.1">
</head>
<body>
  <div id="app">
    <!-- GAME PAGE -->
    <div id="game" class="page active">
      <header id="header">
        <span id="level-label">Level 1</span>
        <div id="header-info">
          <div class="header-pizza-icon"></div>
          <span id="pizza-count">× 1</span>
          <div class="header-mouse-icon">
            <div class="hm-ears"><div class="hm-ear"></div><div class="hm-ear"></div></div>
            <div class="hm-body"></div>
          </div>
          <span id="mice-count">× 1</span>
        </div>
        <div id="header-right">
          <span id="lives-display"></span>
          <button id="giveup-btn" aria-label="Give Up">&#10006;</button>
          <button id="settings-btn" aria-label="Settings">&#9881;</button>
        </div>
      </header>
      <div id="play-area">
        <div id="knife-zone">
          <div id="knife">
            <div class="knife-blade"></div>
            <div class="knife-handle"></div>
          </div>
        </div>
        <div id="pizza-area"></div>
        <button id="undo-btn" aria-label="Undo"><svg viewBox="0 0 24 24"><path d="M4 10l5-5v3c7 0 10 3 10 9-2-4-5-5.5-10-5.5V15z"/></svg></button>
      </div>
      <div id="mouse-tray"></div>
      <div id="celebration" class="hidden">
        <div class="celebration-text">Level Complete!</div>
        <div id="fraction-display"></div>
        <div class="celebration-sub">Tap to continue</div>
      </div>
      <div id="failure" class="hidden">
        <div class="failure-text">Oh no!</div>
        <div class="failure-sub">Some mice are still hungry...</div>
        <div class="failure-tap">Tap to try again</div>
      </div>
      <div id="game-over" class="hidden">
        <div class="failure-text">Game Over</div>
        <div class="failure-sub">No lives left!</div>
        <div class="failure-tap">Tap to reset</div>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings-page" class="page">
      <header class="settings-header">
        <button id="settings-back" aria-label="Back">&#8592; Back</button>
        <span>Settings</span>
      </header>
      <div class="settings-body">
        <button id="install-btn" class="settings-item" style="display: none;">Install on Phone</button>
        <button id="reset-btn" class="settings-item settings-danger">Reset to Level 1</button>
        <button id="refresh-btn" class="settings-item">Update Game</button>
        <div class="settings-version" id="version-label"></div>
      </div>
    </div>
  </div>

  <script src="version.js?v=2.0.1"></script>
  <script src="sound.js?v=2.0.1"></script>
  <script src="patterns.js?v=2.0.1"></script>
  <script src="render.js?v=2.0.1"></script>
  <script src="input.js?v=2.0.1"></script>
  <script src="game.js?v=2.0.1"></script>
  <script>
    console.log('Pizza Div v' + APP_VERSION);
    document.getElementById('version-label').textContent = 'Version ' + APP_VERSION;

    // Go fullscreen on first tap (mobile browsers)
    document.addEventListener('click', function goFS() {
      const el = document.documentElement;
      const rfs = el.requestFullscreen || el.webkitRequestFullscreen;
      if (rfs && !document.fullscreenElement && !document.webkitFullscreenElement) {
        rfs.call(el).catch(() => {});
      }
      document.removeEventListener('click', goFS);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then((reg) => {
        reg.update();
      });
    }

    // PWA install prompt
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = '';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const result = await deferredPrompt.userChoice;
      if (result.outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    // Hide install button if already in standalone mode
    if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
      installBtn.style.display = 'none';
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    document.getElementById('settings-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      showPage('settings-page');
    });
    document.getElementById('settings-back').addEventListener('click', () => {
      showPage('game');
    });

    document.getElementById('giveup-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      Game.handleGiveUp();
    });
    document.getElementById('game-over').addEventListener('click', () => {
      Game.handleOverlayTap();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      Game.resetToLevel1();
      showPage('game');
    });

    document.getElementById('refresh-btn').addEventListener('click', async () => {
      const btn = document.getElementById('refresh-btn');
      btn.textContent = 'Updating...';
      btn.disabled = true;
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map((k) => caches.delete(k)));
      }
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((r) => r.unregister()));
      }
      sessionStorage.setItem('showUpdated', '1');
      sessionStorage.setItem('prevVersion', APP_VERSION);
      window.location.reload(true);
    });

    // After update: show settings page with new version, then auto-navigate back
    if (sessionStorage.getItem('showUpdated')) {
      const prevVersion = sessionStorage.getItem('prevVersion');
      sessionStorage.removeItem('showUpdated');
      sessionStorage.removeItem('prevVersion');
      showPage('settings-page');
      if (prevVersion && prevVersion === APP_VERSION) {
        document.getElementById('version-label').textContent = "You're on the latest version already.";
        document.getElementById('version-label').style.color = '#888';
        document.getElementById('version-label').style.fontSize = '1.1rem';
      } else {
        document.getElementById('version-label').textContent = 'Updated to Version ' + APP_VERSION + ' \u2713';
        document.getElementById('version-label').style.color = '#4CAF50';
        document.getElementById('version-label').style.fontSize = '1.1rem';
      }
      setTimeout(() => {
        document.getElementById('version-label').style.color = '';
        document.getElementById('version-label').style.fontSize = '';
        document.getElementById('version-label').textContent = 'Version ' + APP_VERSION;
        showPage('game');
      }, 1500);
    }
  </script>
</body>
</html>
